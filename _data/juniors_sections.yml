- id: one
  style: style1
  image: /images/junior-pic-01.jpg
  title: What is Ultimate?
  content: |
    <p>Ultimate is a team sport combining the passing and movement of netball or basketball with the skill of throwing a disc. Played between two teams on a rectangular pitch, the aim is simple: pass the disc down the field and catch it in the end zone to score.</p>
    <p>Ultimate is built on "Spirit of the Game" — a principle that puts sportsmanship and fair play at its heart. Competitive play is encouraged, but never at the expense of respect between players, adherence to the rules, or the basic joy of play. With no contact, no tackling, and no specialist positions, every child gets involved regardless of size, strength, or prior experience. It's also one of the very few sports where mixed-gender play is the norm at every level, from the playground to international competition.</p>
    <p>The disc itself opens up a whole new set of throwing and catching skills, which can be especially engaging for children who feel disengaged by traditional ball sports.</p>
    <p>The game is self-refereed at all levels. When a player feels the rules have been broken, they stop play and discuss the situation calmly with those involved — together reaching the fairest way to restart. This builds communication, empathy, and resilience in a way few other sports can. As a non-contact sport, children of different ages and abilities can also play safely alongside each other.</p>
    <p>Ultimate is a fast-growing sport with a thriving global community, opening doors to local clubs and competitions as children get older — all while they're having too much fun to notice they're getting fit.</p>
